name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET 10.0.104
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.104'

    - name: Publish API
      run: |
        dotnet publish BlindIdea.API/BlindIdea.API.csproj \
          -c Release \
          -r linux-x64 \
          --self-contained false \
          -o ./publish

    - name: Copy files to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "./publish/*"
        target: "/home/ec2-user/blindidea/publish"
        strip_components: 1
        rm: false

    - name: Restore config and restart service
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cp /home/ec2-user/blindidea-config/appsettings.Production.json \
            /home/ec2-user/blindidea/publish/appsettings.Production.json
          sudo systemctl restart blindidea
          sudo systemctl status blindidea